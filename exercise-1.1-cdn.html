<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exercise 1.1 – Bootstrap 5 via CDN</title>

  <!-- Bootstrap 5 CSS via CDN -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>
<body class="bg-light">

  <div class="container py-5">
    <h1 class="display-4 text-primary">Hello, Bootstrap 5!</h1>
    <p class="lead text-muted">
      This page is linked to Bootstrap 5 using the CDN method.
    </p>
    <a href="#" class="btn btn-primary me-2">Primary Button</a>
    <a href="#" class="btn btn-outline-secondary">Secondary Button</a>
  </div>

  <!-- Bootstrap 5 JS Bundle via CDN -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
  ></script>
</body>
</html>
