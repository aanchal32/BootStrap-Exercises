<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Exercise 8 – Forms</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">
  <div class="container mt-5">
    <h1 class="display-5">Exercise 8 – Forms</h1>
    <hr/>

    <!-- Exercise 8.1 – Registration Form -->
    <h2 class="h5 mt-4">Exercise 8.1 – Registration Form</h2>
    <div class="card shadow-sm mt-3">
      <div class="card-header bg-primary text-white">Create an Account</div>
      <div class="card-body">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">First Name</label>
            <input type="text" class="form-control" placeholder="John"/>
          </div>
          <div class="col-md-6">
            <label class="form-label">Last Name</label>
            <input type="text" class="form-control" placeholder="Doe"/>
          </div>
          <div class="col-12">
            <label class="form-label">Email Address</label>
            <!-- input-group wraps the icon + input together -->
            <div class="input-group">
              <span class="input-group-text">@</span>
              <input type="email" class="form-control" placeholder="john@example.com"/>
            </div>
          </div>
          <div class="col-md-6">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" placeholder="Min. 8 characters"/>
          </div>
          <div class="col-md-6">
            <label class="form-label">Confirm Password</label>
            <input type="password" class="form-control" placeholder="Repeat password"/>
          </div>
          <div class="col-md-6">
            <label class="form-label">Phone Number</label>
            <div class="input-group">
              <span class="input-group-text">+91</span>
              <input type="tel" class="form-control" placeholder="9876543210"/>
            </div>
          </div>
          <div class="col-md-6">
            <label class="form-label">Date of Birth</label>
            <input type="date" class="form-control"/>
          </div>
          <div class="col-12">
            <label class="form-label">Gender</label>
            <div class="d-flex gap-4">
              <div class="form-check">
                <input class="form-check-input" type="radio" name="gender" id="male"/>
                <label class="form-check-label" for="male">Male</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="radio" name="gender" id="female"/>
                <label class="form-check-label" for="female">Female</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="radio" name="gender" id="other"/>
                <label class="form-check-label" for="other">Other</label>
              </div>
            </div>
          </div>
          <div class="col-12">
            <label class="form-label">Interests</label>
            <div class="d-flex gap-4 flex-wrap">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="tech"/>
                <label class="form-check-label" for="tech">Technology</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="design"/>
                <label class="form-check-label" for="design">Design</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="business"/>
                <label class="form-check-label" for="business">Business</label>
              </div>
            </div>
          </div>
          <div class="col-12">
            <label class="form-label">Country</label>
            <select class="form-select">
              <option selected disabled>Choose...</option>
              <option>India</option>
              <option>USA</option>
              <option>UK</option>
              <option>Canada</option>
            </select>
          </div>
          <div class="col-12">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="terms"/>
              <label class="form-check-label" for="terms">
                I agree to the <a href="#">Terms and Conditions</a>
              </label>
            </div>
          </div>
          <div class="col-12">
            <button class="btn btn-primary w-100">Register</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Exercise 8.2 – Login Form with form-floating -->
    <h2 class="h5 mt-5">Exercise 8.2 – Login Form with form-floating</h2>
    <div class="card shadow-sm mt-3" style="max-width: 420px;">
      <div class="card-header bg-dark text-white">Login to Your Account</div>
      <div class="card-body p-4">
        <!-- form-floating puts the label INSIDE the input as a floating placeholder -->
        <div class="form-floating mb-3">
          <input type="email" class="form-control" id="loginEmail" placeholder="name@example.com"/>
          <label for="loginEmail">Email address</label>
        </div>
        <div class="form-floating mb-3">
          <input type="password" class="form-control" id="loginPassword" placeholder="Password"/>
          <label for="loginPassword">Password</label>
        </div>
        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="rememberMe"/>
          <label class="form-check-label" for="rememberMe">Remember me</label>
        </div>
        <button class="btn btn-dark w-100">Sign In</button>
        <p class="text-center mt-3 mb-0 small">
          <a href="#">Forgot password?</a> · <a href="#">Create account</a>
        </p>
      </div>
    </div>

    <div class="alert alert-info mt-4">
      💡 <strong>Key classes used:</strong>
      <code>form-control</code>, <code>form-check</code>, <code>form-check-input</code>,
      <code>input-group</code>, <code>form-select</code>, <code>form-floating</code>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
